<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>함께 정렬</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">함께 정렬</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illust" aria-hidden="true">
        <svg viewBox="0 0 260 100" width="260" height="100">
          <!-- 정렬 줄 -->
          <rect x="20" y="10" width="220" height="34" rx="10" fill="#C8E6C9" stroke="#2C2C2C" stroke-width="3"/>
          <rect x="28" y="17" width="40" height="20" rx="6" fill="#43A047" stroke="#2C2C2C" stroke-width="2"/>
          <text x="48" y="31" text-anchor="middle" font-size="13" font-weight="900" fill="#fff">3</text>
          <rect x="74" y="17" width="40" height="20" rx="6" fill="#43A047" stroke="#2C2C2C" stroke-width="2"/>
          <text x="94" y="31" text-anchor="middle" font-size="13" font-weight="900" fill="#fff">7</text>
          <rect x="120" y="17" width="40" height="20" rx="6" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="2" stroke-dasharray="4,3"/>
          <text x="140" y="31" text-anchor="middle" font-size="13" font-weight="700" fill="#BDBDBD">?</text>
          <!-- 수 카드들 -->
          <rect x="30" y="60" width="36" height="30" rx="7" fill="#fff" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="48" y="80" text-anchor="middle" font-size="14" font-weight="900">12</text>
          <rect x="74" y="60" width="36" height="30" rx="7" fill="#FFF9C4" stroke="#F57F17" stroke-width="2.5"/>
          <text x="92" y="80" text-anchor="middle" font-size="14" font-weight="900">9</text>
          <text x="95" y="57" text-anchor="middle" font-size="10" fill="#F57F17" font-weight="900">▲다음!</text>
          <rect x="118" y="60" width="36" height="30" rx="7" fill="#fff" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="136" y="80" text-anchor="middle" font-size="14" font-weight="900">3</text>
          <rect x="162" y="60" width="36" height="30" rx="7" fill="#fff" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="180" y="80" text-anchor="middle" font-size="14" font-weight="900">17</text>
          <rect x="206" y="60" width="36" height="30" rx="7" fill="#fff" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="224" y="80" text-anchor="middle" font-size="14" font-weight="900">5</text>
        </svg>
      </div>
      <p class="intro-text">다음 순서 숫자를 아무나 빨리 터치!</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>

      <div class="intro-rules">
        <div class="rule-item">📊 모든 존이 같은 수 카드 — 누구나 다음 수 탭!</div>
        <div class="rule-item">❌ 틀리면 팀 시간 -2초 경고</div>
        <div class="rule-item">⏰ 제한 시간 안에 전부 정렬 = 성공!</div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar" id="topBar">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 6</div>
        <div class="problem-timer" id="problemTimer">30</div>
        <div class="direction-badge" id="directionBadge">⬆️ 작은 수부터</div>
      </div>
      <!-- 정렬 결과 줄 -->
      <div class="sorted-row" id="sortedRow"></div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">함께 정렬 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=8"></script>
  <script src="game.js"></script>
</body>
</html>
