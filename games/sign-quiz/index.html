<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>표지판 읽기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">표지판 읽기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illust" aria-hidden="true">
        <svg viewBox="0 0 200 110" width="200" height="110" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="192" height="102" rx="14" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 횡단보도 표지판 -->
          <rect x="18" y="18" width="52" height="52" rx="6" fill="#1565C0" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="44" y="54" text-anchor="middle" font-size="26" font-family="sans-serif">🚶</text>
          <!-- 진입 금지 표지판 -->
          <circle cx="110" cy="44" r="28" fill="#C62828" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="85" y="37" width="50" height="12" rx="3" fill="white"/>
          <!-- 어린이 보호구역 표지판 -->
          <polygon points="165,18 193,70 137,70" fill="#FDD835" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="165" y="64" text-anchor="middle" font-size="20" font-family="sans-serif">👧</text>
          <!-- 물음표 -->
          <text x="110" y="96" text-anchor="middle" font-size="14" font-weight="900" fill="#C62828" font-family="sans-serif">이게 무슨 뜻?</text>
        </svg>
      </div>
      <p class="intro-text">표지판을 보고<br>뜻을 맞혀요!</p>
      <p class="intro-subtext">먼저 정답을 터치 · 오답은 라운드 실격 · 10라운드 승부</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <!-- 상단 문제 패널: 표지판 SVG -->
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 10</div>
        <div class="problem-timer" id="problemTimer">10</div>
      </div>
      <div class="sign-display" id="signDisplay"></div>
      <div class="problem-status" id="problemStatus"></div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=8"></script>
  <script src="game.js"></script>
</body>
</html>
