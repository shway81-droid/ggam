<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>보물 좌표</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">보물 좌표</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 120" width="240" height="120">
          <!-- P1 격자 (보물 있음) -->
          <text x="30" y="12" text-anchor="middle" font-size="8" font-weight="800" fill="#0288D1">P1 지도</text>
          <rect x="8" y="18" width="44" height="44" rx="4" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="2"/>
          <!-- 격자 선 -->
          <line x1="19" y1="18" x2="19" y2="62" stroke="#ccc" stroke-width="1"/>
          <line x1="30" y1="18" x2="30" y2="62" stroke="#ccc" stroke-width="1"/>
          <line x1="41" y1="18" x2="41" y2="62" stroke="#ccc" stroke-width="1"/>
          <line x1="8" y1="29" x2="52" y2="29" stroke="#ccc" stroke-width="1"/>
          <line x1="8" y1="40" x2="52" y2="40" stroke="#ccc" stroke-width="1"/>
          <line x1="8" y1="51" x2="52" y2="51" stroke="#ccc" stroke-width="1"/>
          <!-- 보물 -->
          <text x="36" y="38" text-anchor="middle" font-size="14">💎</text>

          <!-- 화살표 -->
          <text x="86" y="45" text-anchor="middle" font-size="16">→</text>
          <text x="86" y="62" text-anchor="middle" font-size="9" font-weight="800" fill="#F4511E">C2</text>

          <!-- P2 격자 (빈 칸) -->
          <text x="168" y="12" text-anchor="middle" font-size="8" font-weight="800" fill="#E53935">P2 지도</text>
          <rect x="146" y="18" width="44" height="44" rx="4" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="2"/>
          <line x1="157" y1="18" x2="157" y2="62" stroke="#ccc" stroke-width="1"/>
          <line x1="168" y1="18" x2="168" y2="62" stroke="#ccc" stroke-width="1"/>
          <line x1="179" y1="18" x2="179" y2="62" stroke="#ccc" stroke-width="1"/>
          <line x1="146" y1="29" x2="190" y2="29" stroke="#ccc" stroke-width="1"/>
          <line x1="146" y1="40" x2="190" y2="40" stroke="#ccc" stroke-width="1"/>
          <line x1="146" y1="51" x2="190" y2="51" stroke="#ccc" stroke-width="1"/>
          <!-- P2가 맞힌 보물 위치 -->
          <rect x="168" y="29" width="11" height="11" rx="2" fill="#FFD54F" stroke="#2C2C2C" stroke-width="1.5"/>
          <text x="173" y="38" text-anchor="middle" font-size="8">✓</text>

          <!-- 좌표 설명 -->
          <text x="120" y="85" text-anchor="middle" font-size="9" font-weight="800" fill="#333">열(A~D) + 행(1~4)</text>
          <text x="120" y="98" text-anchor="middle" font-size="9" fill="#555">예: C2 = C열 2행</text>
        </svg>
      </div>

      <p class="intro-text">좌표로 보물 위치를 전달해요!</p>
      <div class="badge-2p">👥 2명 전용</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#F4511E" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>P1이 좌표 버튼으로 위치 전달!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M5 12a7 7 0 0 1 14 0"/>
            <path d="M2 12a10 10 0 0 1 20 0"/>
          </svg>
          <span>P2가 좌표를 보고 격자에서 터치!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/>
          </svg>
          <span>8라운드! 보물을 많이 찾으면 고득점!</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="round-banner">
        <span class="round-label">라운드</span>
        <span class="round-num" id="roundNum">1/8</span>
        <span class="round-score" id="roundScore">🏆 0점</span>
      </div>
      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 두 존 영역 -->
    <div class="zones-wrap p2" id="zonesWrap">
      <!-- P1 존: 보물 지도 + 좌표 전송 패드 -->
      <div class="cp-zone p1-zone" id="p1Zone">
        <div class="zone-header">
          <span class="zone-label p1-label">P1 (지도)</span>
          <span class="zone-score" id="p1ScoreEl">0점</span>
        </div>
        <div class="map-label-row" id="p1MapLabelRow"></div>
        <div class="map-grid-wrap">
          <div class="map-row-labels" id="p1RowLabels"></div>
          <div class="map-grid p1-map" id="p1Map"></div>
        </div>
        <div class="coord-pad-label">좌표 전송:</div>
        <div class="coord-pad" id="coordPad"></div>
        <div class="send-info" id="sendInfo">선택: --</div>
      </div>

      <!-- P2 존: 빈 격자 + 좌표 표시 -->
      <div class="cp-zone p2-zone" id="p2Zone">
        <div class="zone-header">
          <span class="zone-label p2-label">P2 (탐색)</span>
          <span class="zone-score" id="p2ScoreEl">0점</span>
        </div>
        <div class="coord-display" id="coordDisplay">--</div>
        <div class="map-label-row" id="p2MapLabelRow"></div>
        <div class="map-grid-wrap">
          <div class="map-row-labels" id="p2RowLabels"></div>
          <div class="map-grid p2-map" id="p2Map"></div>
        </div>
        <div class="targets-label" id="targetsLabel">남은 보물: 0</div>
      </div>
    </div>

    <!-- 결과 배너 -->
    <div class="banner" id="banner"></div>

    <!-- 오버레이 -->
    <div class="turn-overlay" id="turnOverlay">
      <div class="overlay-card">
        <span class="overlay-emoji" id="overlayEmoji">🗺️</span>
        <h3 class="overlay-title" id="overlayTitle">라운드 시작!</h3>
        <p class="overlay-sub" id="overlaySub">P1이 좌표를 전달해요!</p>
        <button class="btn btn-primary overlay-btn" id="overlayBtn">시작!</button>
      </div>
    </div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">보물 좌표 결과!</h2>
      <div></div>
    </header>
    <div class="result-body">
      <div class="result-icon-wrap">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="32" fill="#FFCCBC" stroke="#2C2C2C" stroke-width="3"/>
          <text x="40" y="52" text-anchor="middle" font-size="32">🗺️</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">0점</h2>
      <p class="result-sub" id="resultSub">보물 탐험가!</p>
      <table class="result-table">
        <thead>
          <tr>
            <th>라운드</th>
            <th>크기</th>
            <th>보물수</th>
            <th>성공</th>
            <th>점수</th>
          </tr>
        </thead>
        <tbody id="resultTbody"></tbody>
      </table>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=8"></script>
  <script src="game.js"></script>
</body>
</html>
