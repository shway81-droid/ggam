<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>글자 릴레이</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">글자 릴레이</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illust" aria-hidden="true">
        <svg viewBox="0 0 260 110" width="260" height="110">
          <!-- 목표 단어 슬롯 -->
          <rect x="50" y="10" width="160" height="44" rx="10" fill="#E3F2FD" stroke="#2C2C2C" stroke-width="3"/>
          <rect x="60" y="18" width="38" height="28" rx="7" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="102" y="18" width="38" height="28" rx="7" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="144" y="18" width="38" height="28" rx="7" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="79" y="38" text-anchor="middle" font-size="15" font-weight="900">무</text>
          <text x="121" y="38" text-anchor="middle" font-size="15" font-weight="900">지</text>
          <text x="163" y="38" text-anchor="middle" font-size="15" font-weight="900">개</text>
          <!-- 힌트 이모지 -->
          <text x="213" y="46" text-anchor="middle" font-size="30">🌈</text>
          <!-- P1 존 -->
          <rect x="20" y="66" width="100" height="34" rx="8" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="33" y="86" text-anchor="middle" font-size="11" font-weight="900" fill="#1565C0">P1</text>
          <text x="75" y="86" text-anchor="middle" font-size="14" font-weight="900">무 개</text>
          <!-- P2 존 -->
          <rect x="140" y="66" width="100" height="34" rx="8" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="153" y="86" text-anchor="middle" font-size="11" font-weight="900" fill="#C62828">P2</text>
          <text x="195" y="86" text-anchor="middle" font-size="14" font-weight="900">지</text>
        </svg>
      </div>
      <p class="intro-text">순서에 맞는 글자를 내 존에서 터치!</p>
      <div class="badge-2p">👥 2명 전용</div>
      <div class="intro-rules">
        <div class="rule-item">🧩 목표 단어가 위에 제시돼요</div>
        <div class="rule-item">👆 내 존에서 지금 차례 글자를 터치!</div>
        <div class="rule-item">⚠️ 틀린 글자 탭 → 1초 잠금 페널티</div>
        <div class="rule-item">⏰ 90초 동안 최대한 많은 단어를!</div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 상단: 목표 단어 + 힌트 + 타이머 -->
    <div class="top-bar" id="topBar">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">단어 1</div>
        <div class="problem-timer" id="problemTimer">90</div>
        <div class="word-score-badge" id="wordScoreBadge">✓ 0</div>
      </div>
      <div class="word-display" id="wordDisplay">
        <!-- 음절 슬롯들 -->
      </div>
      <div class="hint-emoji" id="hintEmoji">🌈</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <!-- P1 존 + P2 존 -->
    <div class="zones-wrap p2" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">글자 릴레이 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=8"></script>
  <script src="game.js"></script>
</body>
</html>
